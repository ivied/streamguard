StreamGuard.Filter="StreamGuard Blur"

# Performance / pipeline
StreamGuard.MaxResolution="Max processing resolution"
StreamGuard.MaxResolution.Description="Internally cap the resolution at which OCR and the delay-buffer run. Lower = much less RAM (47 frames × pixels × 4 B); the output is upscaled back to the source size with mild softness on retina captures. Pick 1080p on tight machines, Native if you have headroom."
StreamGuard.MaxResolution.Native="Native (no cap)"
StreamGuard.MaxResolution.720="Cap at 720p"
StreamGuard.MaxResolution.1080="Cap at 1080p"
StreamGuard.MaxResolution.1440="Cap at 1440p"

StreamGuard.OcrRateHz="OCR rate when active (Hz)"
StreamGuard.OcrRateHz.Description="How often Apple Vision is run on the source while secrets are being detected. Higher = motion / scrolling text is covered tighter, but more Neural Engine and battery. Default 4 Hz."

StreamGuard.OcrIdleRateHz="OCR rate when idle (Hz)"
StreamGuard.OcrIdleRateHz.Description="Falls to this rate after several OCR ticks find nothing — saves CPU on a static screen. Returns to the active rate the moment a secret is detected again."

StreamGuard.BufferDelayMs="Buffer delay (ms)"
StreamGuard.BufferDelayMs.Description="The plugin holds N frames before output so OCR has time to inspect every frame before it leaves. Bigger = safer against new-secret leaks, but more RAM and more lag on the stream. Must be larger than the worst-case OCR period + Vision latency (~150 ms). Default 500."

StreamGuard.BlurStrength="Blur strength"
StreamGuard.BlurStrength.Description="Radius of the disc blur applied inside the censored region. Low = barely-blurred; High = unreadable even from screenshots. Doesn't affect performance noticeably."
StreamGuard.BlurStrength.Low="Low"
StreamGuard.BlurStrength.Medium="Medium"
StreamGuard.BlurStrength.High="High"

# Detection
StreamGuard.IgnoreUrls="Don't blur URLs"
StreamGuard.IgnoreUrls.Description="Skip URL-looking text (http://, https://, www.…) for the entropy and label-proximity passes. Content-regex rules (AWS, GitHub, Stripe, …) still match inside URLs, so a real key embedded in a URL still gets blurred."

StreamGuard.UseEntropy="Detect random-looking strings (entropy)"
StreamGuard.UseEntropy.Description="Catches credentials that don't match a known regex pattern by their Shannon entropy (≥ 4.5 bits/char over a contiguous token of ≥ 14 chars). Source of most false positives — turn off if normal code identifiers keep getting blurred."

StreamGuard.UseLabelProximity="Detect by label proximity (Password, Пароль, …)"
StreamGuard.UseLabelProximity.Description="Blurs whatever sits next to text that says 'Password' / 'Пароль' / 'Secret' / 'API key' / 'PIN' etc. — same row, directly above, or directly below. This is the only way to catch weak/short passwords like 'qwerty12345' that look harmless on their own."
